<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BDLearn | Login</title>
    <!-- Google Fonts + Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fefefe 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Tombol Back to Home di pojok kiri atas */
        .back-button-solid {
            position: fixed;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #314577;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(49, 69, 119, 0.25);
            z-index: 100;
        }

        .back-button-solid i {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .back-button-solid:hover {
            background: #25355b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 69, 119, 0.35);
        }

        .back-button-solid:hover i {
            transform: translateX(-3px);
        }

        .login-wrapper {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* Title Logo di luar box - ukuran normal (1x) */
        .login-header {
            margin-bottom: 24px;
        }

        .logo-image {
            height: 80px;
            width: auto;
            display: inline-block;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: #6C7A96;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Box / Card untuk form login */
        .login-card {
            background: white;
            border-radius: 2rem;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #334155;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #314577;
            box-shadow: 0 0 0 3px rgba(49, 69, 119, 0.1);
        }

        .form-group input::placeholder {
            color: #CBD5E1;
        }

        .btn-login {
            width: 100%;
            background: #314577;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: #25355b;
            transform: translateY(-2px);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #314577;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .forgot-password a:hover {
            text-decoration: underline;
            color: #25355b;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #EFF3F8;
            font-size: 0.85rem;
            color: #6C7A96;
        }

        .register-link a {
            color: #314577;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: #25355b;
        }

        @media (max-width: 560px) {
            .login-card {
                padding: 28px 20px;
            }
            .logo-image {
                height: 60px;
            }
            .login-subtitle {
                font-size: 0.8rem;
            }
            .back-button-solid {
                top: 16px;
                left: 16px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Tombol Back to Home di pojok kiri ATAS -->
    <a href="../BDLearn.html" class="back-button-solid">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="login-wrapper">
        <!-- Logo dan Subtitle di LUAR box -->
        <div class="login-header">
            <img src="../BDLearn.png" alt="BDLearn Logo" class="logo-image">
            <p class="login-subtitle">Daftar untuk memulai perjalanan belajarmu</p>
        </div>

        <!-- Box / Card untuk form login -->
        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Masukkan email Anda" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-login">Next</button>
            </form>
            
            <div class="forgot-password">
                <!-- Link langsung ke lupa_password.html - TIDAK ADA event.preventDefault() lagi -->
                <a href="../lupa_password/lupa_password.html">Lupa Password?</a>
            </div>
            
            <div class="register-link">
                Belum punya akun? <a href="../register/register.html">Register</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const loginForm = document.getElementById('loginForm');
            
            if(loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    
                    if(!email || !password) {
                        alert('Please fill in all fields');
                        return;
                    }
                    
                    if(!email.includes('@')) {
                        alert('Please enter a valid email address');
                        document.getElementById('email').style.borderColor = '#EF4444';
                        return;
                    }
                    
                    alert(`✨ Login successful!\nWelcome back!\nEmail: ${email}\n\nThis is a demo interface.`);
                    
                    window.location.href = '../BDLearn.html';
                });
            }
            
            document.querySelectorAll('.form-group input').forEach(input => {
                input.addEventListener('focus', () => {
                    input.style.borderColor = '#E2E8F0';
                });
            });
        })();
    </script>
</body>
</html>
