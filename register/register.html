<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BDLearn | Register</title>
    <!-- Google Fonts + Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fefefe 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Tombol Back to Home di pojok kiri atas */
        .back-button-solid {
            position: fixed;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #314577;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(49, 69, 119, 0.25);
            z-index: 100;
        }

        .back-button-solid i {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .back-button-solid:hover {
            background: #25355b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 69, 119, 0.35);
        }

        .back-button-solid:hover i {
            transform: translateX(-3px);
        }

        .register-container {
            max-width: 480px;
            width: 100%;
        }

        .register-card {
            background: white;
            border-radius: 2rem;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .register-card h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #1A1F36;
            text-align: center;
        }

        .register-highlight {
            background: linear-gradient(120deg, #314577, #4A6FA5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .register-subtitle {
            text-align: center;
            color: #6C7A96;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #314577;
            box-shadow: 0 0 0 3px rgba(49, 69, 119, 0.1);
        }

        .form-group input::placeholder {
            color: #CBD5E1;
        }

        .btn-register {
            width: 100%;
            background: #314577;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-register:hover {
            background: #25355b;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #6C7A96;
        }

        .login-link a {
            color: #314577;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #25355b;
        }

        /* ========== GLASSMORPHISM MODAL POPUP ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            animation: modalPopIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalPopIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #314577, #4A6FA5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            animation: iconPop 0.5s ease-out 0.2s both;
        }

        @keyframes iconPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon i {
            font-size: 40px;
            color: white;
        }

        .modal-glass h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1A1F36;
            margin-bottom: 12px;
        }

        .modal-glass p {
            color: #6C7A96;
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .timer-text {
            font-size: 0.85rem;
            color: #6C7A96;
            margin-bottom: 20px;
        }

        .timer-number {
            font-weight: 800;
            font-size: 1.1rem;
            color: #314577;
            display: inline-block;
            min-width: 30px;
        }

        .modal-btn-login {
            width: 100%;
            background: #314577;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .modal-btn-login:hover {
            background: #25355b;
            transform: translateY(-2px);
        }

        .modal-btn-login:disabled {
            background: #94A3B8;
            cursor: not-allowed;
            transform: none;
        }

        /* Ripple effect untuk tombol modal */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleAnimation 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleAnimation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 560px) {
            .register-card {
                padding: 32px 24px;
            }
            .register-card h1 {
                font-size: 1.5rem;
            }
            .back-button-solid {
                top: 16px;
                left: 16px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .modal-glass {
                padding: 32px 24px;
            }
            .modal-glass h2 {
                font-size: 1.5rem;
            }
            .success-icon {
                width: 60px;
                height: 60px;
            }
            .success-icon i {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Tombol Back to Home di pojok kiri ATAS -->
    <a href="../BDLearn.html" class="back-button-solid">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="register-container">
        <div class="register-card">
            <h1>Register<span class="register-highlight"></span></h1>
            <p class="register-subtitle">Daftar untuk memulai perjalanan belajarmu</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required>
                </div>
                <button type="submit" class="btn-register" id="registerBtn">Register</button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="../login/login.html">Login</a>
            </div>
        </div>
    </div>

    <!-- GLASSMORPHISM MODAL POPUP -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-glass">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Akun Kamu Berhasil Terdaftar</h2>
            <p>Kamu bisa kembali ke halaman utama untuk Login, atau klik tombol dibawah</p>
            <div class="timer-text">
                <span>Redirecting in </span>
                <span class="timer-number" id="timerCount">5</span>
                <span> seconds...</span>
            </div>
            <button class="modal-btn-login" id="modalLoginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
    </div>

    <script>
        (function() {
            const registerForm = document.getElementById('registerForm');
            const modalOverlay = document.getElementById('successModal');
            const modalLoginBtn = document.getElementById('modalLoginBtn');
            const timerCountSpan = document.getElementById('timerCount');
            
            let countdownInterval = null;
            let timerValue = 5;
            let isRedirecting = false;
            
            // Function to show modal
            function showModal() {
                modalOverlay.classList.add('active');
                startCountdown();
            }
            
            // Function to start countdown timer
            function startCountdown() {
                timerValue = 5;
                timerCountSpan.textContent = timerValue;
                
                // Disable button initially
                modalLoginBtn.disabled = true;
                modalLoginBtn.style.opacity = '0.6';
                modalLoginBtn.style.cursor = 'not-allowed';
                
                // Clear existing interval if any
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
                
                // Start new countdown
                countdownInterval = setInterval(() => {
                    timerValue--;
                    timerCountSpan.textContent = timerValue;
                    
                    if (timerValue <= 0) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        // Enable button and redirect
                        modalLoginBtn.disabled = false;
                        modalLoginBtn.style.opacity = '1';
                        modalLoginBtn.style.cursor = 'pointer';
                        
                        // Auto redirect after timer finishes
                        if (!isRedirecting) {
                            isRedirecting = true;
                            window.location.href = '../login/login.html';
                        }
                    }
                }, 1000);
            }
            
            // Function to stop countdown and redirect manually
            function redirectToLogin() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (!isRedirecting) {
                    isRedirecting = true;
                    window.location.href = '../login/login.html';
                }
            }
            
            // Manual login button click handler
            if (modalLoginBtn) {
                modalLoginBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    redirectToLogin();
                });
            }
            
            // Handle form submission
            if (registerForm) {
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const fullName = document.getElementById('fullName').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    
                    // Reset border colors
                    document.querySelectorAll('.form-group input').forEach(input => {
                        input.style.borderColor = '#E2E8F0';
                    });
                    
                    // Validation
                    if (!fullName || !email || !password || !confirmPassword) {
                        alert('Harap isi semua field');
                        return;
                    }
                    
                    if (password !== confirmPassword) {
                        alert('Password dan Konfirmasi Password tidak cocok!');
                        document.getElementById('confirmPassword').style.borderColor = '#EF4444';
                        return;
                    }
                    
                    if (password.length < 8) {
                        alert('Password minimal harus 8 karakter');
                        document.getElementById('password').style.borderColor = '#EF4444';
                        return;
                    }
                    
                    if (!email.includes('@') || !email.includes('.')) {
                        alert('Masukkan email yang valid');
                        document.getElementById('email').style.borderColor = '#EF4444';
                        return;
                    }
                    
                    // Jika validasi berhasil, tampilkan modal
                    showModal();
                    
                    // Optional: Clear form after successful registration
                    // registerForm.reset();
                });
            }
            
            // Reset border color on focus
            document.querySelectorAll('.form-group input').forEach(input => {
                input.addEventListener('focus', () => {
                    input.style.borderColor = '#E2E8F0';
                });
            });
            
            // Close modal when clicking outside (optional)
            if (modalOverlay) {
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) {
                        // Don't close if timer is still running? Just redirect instead
                        redirectToLogin();
                    }
                });
            }
            
            // Prevent accidental navigation when modal is open
            window.addEventListener('beforeunload', (e) => {
                if (modalOverlay.classList.contains('active')) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
        })();
    </script>
</body>
</html>
