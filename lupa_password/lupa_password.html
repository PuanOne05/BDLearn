<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BDLearn | Lupa Kata Sandi</title>
    <!-- Google Fonts + Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fefefe 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Tombol Back ke Login di pojok kiri atas */
        .back-button-solid {
            position: fixed;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #314577;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(49, 69, 119, 0.25);
            z-index: 100;
        }

        .back-button-solid i {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .back-button-solid:hover {
            background: #25355b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 69, 119, 0.35);
        }

        .back-button-solid:hover i {
            transform: translateX(-3px);
        }

        .forgot-wrapper {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* Title Logo di luar box */
        .forgot-header {
            margin-bottom: 24px;
        }

        .logo-image {
            height: 80px;
            width: auto;
            display: inline-block;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .forgot-subtitle {
            color: #6C7A96;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Box / Card untuk form lupa password */
        .forgot-card {
            background: white;
            border-radius: 2rem;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* Icon header */
        .lock-icon {
            background: #EFF6FF;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        .lock-icon i {
            font-size: 32px;
            color: #314577;
        }

        .forgot-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1A1F36;
            margin-bottom: 12px;
        }

        .forgot-description {
            color: #6C7A96;
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #334155;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #314577;
            box-shadow: 0 0 0 3px rgba(49, 69, 119, 0.1);
        }

        .form-group input::placeholder {
            color: #CBD5E1;
        }

        .btn-send {
            width: 100%;
            background: #314577;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-send:hover {
            background: #25355b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 69, 119, 0.3);
        }

        .back-to-login {
            text-align: center;
        }

        .back-to-login a {
            color: #314577;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-to-login a:hover {
            color: #25355b;
            text-decoration: underline;
            transform: translateX(-3px);
        }

        .back-to-login a i {
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .back-to-login a:hover i {
            transform: translateX(-3px);
        }

        /* Alert/Success message styling */
        .alert-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-message i {
            font-size: 1rem;
        }

        .alert-success {
            background: #DCFCE7;
            color: #166534;
            border: 1px solid #86EFAC;
        }

        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        @media (max-width: 560px) {
            .forgot-card {
                padding: 28px 20px;
            }
            .logo-image {
                height: 60px;
            }
            .forgot-subtitle {
                font-size: 0.8rem;
            }
            .back-button-solid {
                top: 16px;
                left: 16px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .forgot-title {
                font-size: 1.5rem;
            }
            .lock-icon {
                width: 55px;
                height: 55px;
            }
            .lock-icon i {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <!-- Tombol Back ke Login -->
    <a href="javascript:history.back()" class="back-button-solid">
        <i class="fas fa-arrow-left"></i> Kembali
    </a>

    <div class="forgot-wrapper">
        <!-- Box / Card untuk form lupa password -->
        <div class="forgot-card">
            <!-- Icon lock -->
            <div class="lock-icon">
                <i class="fas fa-lock"></i>
            </div>

            <h1 class="forgot-title">Lupa Kata Sandi</h1>
            <p class="forgot-description">
                Masukan Email atau No.Handphone untuk membuat kata sandi baru
            </p>

            <!-- Alert message container -->
            <div id="alertMessage" class="alert-message"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email atau No.Handphone</label>
                    <input 
                        type="text" 
                        id="emailOrPhone" 
                        placeholder="contoh@email.com atau 08123456789" 
                        required
                    >
                </div>
                
                <button type="submit" class="btn-send">Kirim</button>
            </form>

            <div class="back-to-login">
                <a href="../login/login.html">
                    <i class="fas fa-arrow-left"></i> Kembali ke Login
                </a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const forgotForm = document.getElementById('forgotPasswordForm');
            const emailOrPhoneInput = document.getElementById('emailOrPhone');
            const alertDiv = document.getElementById('alertMessage');

            function showAlert(message, type) {
                alertDiv.style.display = 'flex';
                alertDiv.className = `alert-message alert-${type}`;
                alertDiv.innerHTML = `
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    <span>${message}</span>
                `;
                if (type === 'success') {
                    setTimeout(() => {
                        alertDiv.style.display = 'none';
                    }, 5000);
                }
            }


            emailOrPhoneInput.addEventListener('input', () => {
                alertDiv.style.display = 'none';
                emailOrPhoneInput.style.borderColor = '#E2E8F0';
            });

            forgotForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const inputValue = emailOrPhoneInput.value.trim();
                
                if (!inputValue) {
                    showAlert('Mohon masukkan Email atau No.Handphone', 'error');
                    emailOrPhoneInput.style.borderColor = '#EF4444';
                    return;
                }
                
                const isEmail = inputValue.includes('@') && inputValue.includes('.');
                const isPhone = /^[0-9+\-\s]{8,15}$/.test(inputValue);
                
                if (!isEmail && !isPhone) {
                    showAlert('Masukkan email yang valid (contoh@email.com) atau nomor handphone (08123456789)', 'error');
                    emailOrPhoneInput.style.borderColor = '#EF4444';
                    return;
                }
                
                emailOrPhoneInput.style.borderColor = '#E2E8F0';
                const submitBtn = document.querySelector('.btn-send');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengirim...';
                submitBtn.disabled = true;
                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                    
                    const identifier = isEmail ? 'Email' : 'Nomor Handphone';
                    showAlert(`✅ Link reset kata sandi telah dikirim ke ${identifier} Anda! Silakan cek inbox/spam.`, 'success');
                    
                    emailOrPhoneInput.value = '';
                    setTimeout(() => {
                        window.location.href = '../login/login.html';
                    }, 3000);
                }, 1500);
            });

            emailOrPhoneInput.addEventListener('focus', () => {
                emailOrPhoneInput.style.borderColor = '#314577';
                alertDiv.style.display = 'none';
            });
        })();
    </script>
</body>
</html>
